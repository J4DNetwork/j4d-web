name: Deploy to GitHub Pages

# Build the compiled CSS and publish the assembled site to GitHub Pages.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege permissions required by the Pages deploy actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Never cancel an in-flight Pages deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build CSS
        run: npm run build:css

      - name: Assemble site
        run: |
          mkdir -p _site/dist
          cp index.html logo.png _site/
          cp dist/styles.css _site/dist/styles.css
          cp CNAME _site/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
